<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Recipe Book</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--cream:#fdf6ec;--warm:#f5e6cc;--amber:#c97d2e;--dk:#8b5412;--ink:#1e1408;--muted:#7a6650;--red:#b33a2a;--card:#fff9f0;--border:#e8d5b5;--hbg:#1e1408;--hfg:#fdf6ec;--sbg:#f5e6cc;--ov:rgba(0,0,0,.55);--fav:#e05a3a}
[data-theme=dark]{--cream:#1a1410;--warm:#2a2018;--amber:#e09040;--dk:#c97d2e;--ink:#f0e8d8;--muted:#a08870;--red:#d04030;--card:#221c14;--border:#3a2e20;--hbg:#0e0c08;--hfg:#f0e8d8;--sbg:#2a2018;--ov:rgba(0,0,0,.75)}
.tc0{background:#fff0e0;border-color:#f0c080;color:#8b5412}.tc1{background:#e8f4e8;border-color:#90c890;color:#2d6e2d}.tc2{background:#e8eeff;border-color:#90a8e8;color:#2040a0}.tc3{background:#fde8f0;border-color:#e890b8;color:#a02060}.tc4{background:#f0e8ff;border-color:#b090e0;color:#5020a0}.tc5{background:#e8f8f8;border-color:#70c8c8;color:#1a6868}.tc6{background:#fff8e0;border-color:#e0c040;color:#806010}.tc7{background:#ffe8e0;border-color:#e09070;color:#903010}
[data-theme=dark] .tc0{background:#3a2810;border-color:#8b6030;color:#e0b070}[data-theme=dark] .tc1{background:#0e2a10;border-color:#407840;color:#80c880}[data-theme=dark] .tc2{background:#101830;border-color:#3050a0;color:#8090e0}[data-theme=dark] .tc3{background:#2a0818;border-color:#803060;color:#e080b0}[data-theme=dark] .tc4{background:#180830;border-color:#5030a0;color:#b080e0}[data-theme=dark] .tc5{background:#082828;border-color:#207878;color:#60c8c8}[data-theme=dark] .tc6{background:#282008;border-color:#806820;color:#e0c060}[data-theme=dark] .tc7{background:#280e08;border-color:#904030;color:#e09070}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
header{background:var(--hbg);color:var(--hfg);padding:18px 16px 14px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.hl{display:flex;align-items:baseline;gap:8px}
h1{font-family:'Playfair Display',serif;font-size:1.4rem;letter-spacing:.02em;font-style:italic}
.rc{font-size:.75rem;background:var(--amber);color:#fff;border-radius:12px;padding:2px 8px;font-weight:600}
.ha{display:flex;gap:8px}
.ib{background:rgba(255,255,255,.12);border:none;color:var(--hfg);width:38px;height:38px;border-radius:50%;font-size:1.05rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.ib:active{background:rgba(255,255,255,.25)}.ib.af{background:var(--fav)}
.sb{padding:10px 16px;background:var(--sbg);border-bottom:1px solid var(--border);position:sticky;top:60px;z-index:99}
.sb input{width:100%;padding:10px 14px;border-radius:24px;border:1.5px solid var(--border);background:var(--card);font-family:'DM Sans',sans-serif;font-size:.95rem;color:var(--ink);outline:none}
.sb input:focus{border-color:var(--amber)}
.rl{padding:16px;display:flex;flex-direction:column;gap:12px;padding-bottom:90px}
.es{text-align:center;padding:60px 20px;color:var(--muted)}.es .ei{font-size:3rem;display:block;margin-bottom:12px}
.rc-card{background:var(--card);border-radius:16px;border:1px solid var(--border);box-shadow:0 2px 16px rgba(100,60,10,.1);overflow:hidden;cursor:pointer;transition:transform .15s;animation:sI .25s ease}
.rc-card:active{transform:scale(.98)}
@keyframes sI{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.rci{padding:14px 16px;display:flex;align-items:center;gap:14px}
.reb{width:50px;height:50px;background:var(--warm);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;border:1px solid var(--border)}
.rm{flex:1;min-width:0}
.rn{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.rta{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.tag{font-size:.7rem;padding:2px 8px;border-radius:12px;font-weight:500;border:1px solid}
.rcr{display:flex;align-items:center;gap:6px;flex-shrink:0}
.fab{position:fixed;bottom:24px;right:20px;width:58px;height:58px;background:var(--amber);color:#fff;border:none;border-radius:50%;font-size:1.6rem;box-shadow:0 4px 20px rgba(201,125,46,.5);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:90;transition:transform .2s}
.fab:active{transform:scale(.93)}
.mo{display:none;position:fixed;inset:0;background:var(--ov);z-index:200;align-items:flex-end}
.mo.open{display:flex}
.modal{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-height:95vh;overflow-y:auto;padding:0 0 32px;animation:sU .3s ease}
@keyframes sU{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mh-bar{width:44px;height:5px;background:var(--border);border-radius:3px;margin:12px auto 8px}
.mh{display:flex;align-items:center;justify-content:space-between;padding:8px 20px 16px;border-bottom:1px solid var(--border)}
.mt{font-family:'Playfair Display',serif;font-size:1.25rem;font-style:italic;color:var(--ink)}
.cb{background:none;border:none;font-size:1.4rem;color:var(--muted);cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center}
.mb{padding:20px}
.fg{margin-bottom:18px}
label{display:block;font-size:.8rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
input[type=text],input[type=url],textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:.95rem;background:var(--cream);color:var(--ink);outline:none;transition:border-color .2s}
input:focus,textarea:focus{border-color:var(--amber)}
textarea{resize:vertical;min-height:100px}
.fr{display:flex;gap:10px}.fr .fg{flex:1}
/* emoji picker */
.etrig{width:100%;height:48px;font-size:1.7rem;background:var(--cream);border:1.5px solid var(--border);border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.epanel{display:none;background:var(--warm);border-radius:14px;border:1.5px solid var(--border);overflow:hidden;margin-bottom:16px}
.etabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);scrollbar-width:none}
.etabs::-webkit-scrollbar{display:none}
.etab{flex-shrink:0;padding:8px 14px;background:none;border:none;border-bottom:3px solid transparent;font-size:1.1rem;cursor:pointer;transition:border-color .15s}
.etab.on{border-bottom-color:var(--amber);background:var(--card)}
.egrid{display:flex;flex-wrap:wrap;gap:2px;padding:10px;max-height:190px;overflow-y:auto}
.ebtn{width:38px;height:38px;font-size:1.35rem;background:none;border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ebtn:active{background:var(--border)}
/* form lists */
.il,.sl{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.ir,.sr{display:flex;gap:8px;align-items:flex-start}
.ir input{flex:1}.sr textarea{flex:1;min-height:60px}
.rb{background:none;border:none;color:var(--red);font-size:1.2rem;cursor:pointer;padding:10px 4px;flex-shrink:0;line-height:1}
.ab{background:none;border:1.5px dashed var(--amber);color:var(--amber);padding:9px 16px;border-radius:10px;font-size:.9rem;font-family:'DM Sans',sans-serif;cursor:pointer;width:100%;font-weight:500}
.ab:active{background:var(--warm)}
.pa{background:var(--warm);border-radius:12px;padding:12px;margin-bottom:10px}
.pa label{margin-bottom:6px}
.pa textarea{min-height:80px;background:var(--cream)}
.pb{margin-top:8px;background:var(--dk);color:#fff;border:none;padding:9px 16px;border-radius:10px;font-size:.9rem;font-family:'DM Sans',sans-serif;cursor:pointer;width:100%;font-weight:500}
.sg{background:var(--warm);border-radius:12px;padding:12px;margin-bottom:18px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sl-label{font-size:.8rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
/* buttons */
.btn{padding:13px 20px;border-radius:14px;border:none;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:500;cursor:pointer;transition:opacity .2s,transform .15s;width:100%;margin-bottom:10px}
.btn:active{opacity:.85;transform:scale(.98)}
.bp{background:var(--amber);color:#fff}.bs{background:var(--warm);color:var(--ink);border:1.5px solid var(--border)}.bd{background:var(--red);color:#fff}
.bf{background:transparent;color:var(--fav);border:1.5px solid var(--fav)}.bf.on{background:var(--fav);color:#fff}
/* view */
.vs{margin-bottom:24px}
.vst{font-family:'Playfair Display',serif;font-size:1rem;font-style:italic;color:var(--dk);border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:12px}
.igt{font-weight:400;font-size:.92rem;color:var(--muted);padding:6px 0;border-bottom:1px dashed var(--border)}
/* ingredient checkboxes */
.ii{display:flex;align-items:flex-start;gap:10px;padding:8px 4px;border-bottom:1px dashed var(--border);font-size:.92rem;cursor:pointer;user-select:none;transition:opacity .2s}
.ii.done{opacity:.35;text-decoration:line-through}
.ii.nc{background:rgba(201,125,46,.09);border-radius:6px;padding-left:8px}
.icb{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all .2s;background:var(--cream);font-size:.6rem;color:var(--cream)}
.ii.done .icb{background:var(--amber);border-color:var(--amber);color:#fff}
.ncl{font-size:.68rem;color:var(--muted);margin-left:auto;padding-left:6px;white-space:nowrap;flex-shrink:0;align-self:center}
/* step checkboxes */
.si{display:flex;gap:12px;padding:10px 0;border-bottom:1px dashed var(--border);font-size:.92rem;line-height:1.55;cursor:pointer;user-select:none;transition:opacity .2s}
.si.done{opacity:.35;text-decoration:line-through}
.sn{min-width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0;margin-top:1px;background:var(--amber);color:#fff;transition:background .2s,color .2s}
.si.done .sn{background:var(--border);color:var(--muted)}
/* scaler */
.scaler{display:flex;align-items:center;justify-content:space-between;background:var(--warm);border-radius:14px;padding:10px 16px;margin-bottom:20px;border:1px solid var(--border)}
.sc-label{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:500}
.sc-ctrl{display:flex;align-items:center;gap:14px}
.sc-btn{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--amber);background:none;color:var(--amber);font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;line-height:1}
.sc-btn:active{background:var(--amber);color:#fff}
.sc-val{font-size:1.1rem;font-weight:600;min-width:36px;text-align:center;color:var(--ink)}
/* view misc */
.vemoji{text-align:center;font-size:3.5rem;padding:16px 0 6px}
.vname{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:var(--ink);margin-bottom:10px;text-align:center}
.vnotes{background:var(--warm);border-radius:10px;padding:12px;font-size:.9rem;line-height:1.6;color:var(--ink);border-left:3px solid var(--amber)}
.li{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--warm);border-radius:10px;margin-bottom:8px;border:1px solid var(--border);text-decoration:none;color:var(--ink)}
/* tag input */
.ti{display:flex;flex-wrap:wrap;gap:6px;padding:8px;border:1.5px solid var(--border);border-radius:12px;background:var(--cream);cursor:text;min-height:46px;align-items:center}
.ti input{border:none;outline:none;background:none;font-size:.95rem;font-family:'DM Sans',sans-serif;min-width:100px;flex:1;padding:2px 4px;color:var(--ink)}
.tchip{display:flex;align-items:center;gap:4px;border-radius:12px;padding:3px 10px;font-size:.8rem;border:1px solid}
.tchip button{background:none;border:none;cursor:pointer;font-size:.9rem;color:var(--muted);padding:0;margin-left:2px}
.lr{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.lfr{display:flex;flex-direction:column;gap:6px;background:var(--cream);border:1px solid var(--border);border-radius:12px;padding:10px}
.lfi{display:flex;gap:8px}.lfi input{flex:1}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:var(--cream);padding:10px 20px;border-radius:24px;font-size:.9rem;z-index:999;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.div{height:1px;background:var(--border);margin:16px 0}
.ss{margin-bottom:20px}
.ss h3{font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;color:var(--dk);margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:6px}
</style>
</head>
<body>
<header>
  <div class="hl">
    <h1>📖 Recipe Book</h1>
    <span class="rc" id="rCount">0</span>
  </div>
  <div class="ha">
    <button class="ib" id="favBtn2" onclick="toggleFavFilter()" title="Favourites">❤️</button>
    <button class="ib" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <button class="ib" onclick="openSettings()">⚙️</button>
  </div>
</header>
<div class="sb"><input type="text" id="searchInput" placeholder="Search recipes…" oninput="renderList()"></div>
<div class="rl" id="recipeList"></div>
<button class="fab" onclick="openAdd()">+</button>

<!-- ADD/EDIT -->
<div class="mo" id="addModal">
  <div class="modal">
    <div class="mh-bar"></div>
    <div class="mh"><span class="mt" id="addTitle">New Recipe</span><button class="cb" onclick="closeAdd()">✕</button></div>
    <div class="mb">
      <div class="fr">
        <div class="fg" style="flex:0 0 72px">
          <label>Emoji</label>
          <button type="button" class="etrig" id="eTrig" onclick="toggleEPanel()">🍽️</button>
          <input type="hidden" id="fEmoji" value="🍽️">
        </div>
        <div class="fg"><label>Recipe Name *</label><input type="text" id="fName" placeholder="e.g. Garlic Pepper Chicken"></div>
      </div>
      <div class="epanel" id="ePanel"><div class="etabs" id="eTabs"></div><div class="egrid" id="eGrid"></div></div>
      <div class="fg"><label>Tags</label><div class="ti" id="tagsBox" onclick="document.getElementById('tagIn').focus()"><input type="text" id="tagIn" placeholder="Add tag, press Enter…" onkeydown="tagKey(event)"></div></div>
      <div class="div"></div>
      <div class="pa"><label>📋 Paste Ingredients</label><textarea id="pasteIng" placeholder="* or - bullets. Lines without bullets = group labels."></textarea><button class="pb" onclick="parseIng()">↪ Parse Ingredients</button></div>
      <div class="sg"><div class="sh"><span class="sl-label">Ingredients</span><button class="ab" style="width:auto;padding:5px 12px;font-size:.8rem" onclick="addIR()">+ Add</button></div><div class="il" id="ingList"></div></div>
      <div class="div"></div>
      <div class="pa"><label>📋 Paste Steps</label><textarea id="pasteSteps" placeholder="Numbered or plain steps."></textarea><button class="pb" onclick="parseSteps()">↪ Parse Steps</button></div>
      <div class="sg"><div class="sh"><span class="sl-label">Steps</span><button class="ab" style="width:auto;padding:5px 12px;font-size:.8rem" onclick="addSR()">+ Add</button></div><div class="sl" id="stepList"></div></div>
      <div class="div"></div>
      <div class="sg"><div class="sh"><span class="sl-label">🔗 Links</span><button class="ab" style="width:auto;padding:5px 12px;font-size:.8rem" onclick="addLR()">+ Add</button></div><div class="lr" id="linkRows"></div></div>
      <div class="fg"><label>Notes</label><textarea id="fNotes" placeholder="Tips, substitutions…"></textarea></div>
      <button class="btn bp" onclick="saveRecipe()">Save Recipe</button>
      <button class="btn bs" onclick="closeAdd()">Cancel</button>
      <div id="delBtn"></div>
    </div>
  </div>
</div>

<!-- VIEW -->
<div class="mo" id="viewModal">
  <div class="modal">
    <div class="mh-bar"></div>
    <div class="mh"><span class="mt">Recipe</span><button class="cb" onclick="closeView()">✕</button></div>
    <div class="mb" id="viewBody"></div>
  </div>
</div>

<!-- SETTINGS -->
<div class="mo" id="settingsModal">
  <div class="modal">
    <div class="mh-bar"></div>
    <div class="mh"><span class="mt">Settings & Data</span><button class="cb" onclick="closeSettings()">✕</button></div>
    <div class="mb">
      <div class="ss"><h3>Export</h3><button class="btn bs" onclick="exportAll()">⬇ Export All as CSV</button></div>
      <div class="ss"><h3>Import</h3><p style="font-size:.85rem;color:var(--muted);margin-bottom:10px">Import a CSV previously exported from this app.</p><input type="file" id="csvIn" accept=".csv" style="display:none" onchange="importCSV(event)"><button class="btn bs" onclick="document.getElementById('csvIn').click()">⬆ Import CSV</button></div>
      <div class="ss"><h3>Danger Zone</h3><button class="btn bd" onclick="clearAll()">🗑 Clear All Recipes</button></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ────────────────────────────────────────
const SK='recipebook_v3', PK='recipebook_prefs';
let recipes=[], editId=null, curTags=[], showFavs=false;
let viewId=null, servings=1;
const doneI=new Set(), doneS=new Set();

function load(){try{recipes=JSON.parse(localStorage.getItem(SK))||[];}catch{recipes=[];}}
function save(){localStorage.setItem(SK,JSON.stringify(recipes));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}

// ── Theme ────────────────────────────────────────
function loadPrefs(){try{if((JSON.parse(localStorage.getItem(PK))||{}).dark)applyDark(true,false);}catch{}}
function applyDark(on,persist){
  document.documentElement[on?'setAttribute':'removeAttribute']('data-theme','dark');
  document.getElementById('themeBtn').textContent=on?'☀️':'🌙';
  if(persist!==false)localStorage.setItem(PK,JSON.stringify({dark:on}));
}
function toggleTheme(){applyDark(document.documentElement.getAttribute('data-theme')!=='dark');}

// ── Toast ────────────────────────────────────────
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

// ── Tag colours ──────────────────────────────────
const tmap={};let ti=0;
function tcls(t){if(!tmap[t])tmap[t]='tc'+(ti++%8);return tmap[t];}
function tagH(t){return '<span class="tag '+tcls(t)+'">'+t+'</span>';}

// ── Fav filter ───────────────────────────────────
function toggleFavFilter(){
  showFavs=!showFavs;
  document.getElementById('favBtn2').classList.toggle('af',showFavs);
  renderList();
}

// ── Render list ──────────────────────────────────
function renderList(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  let list=recipes.filter(r=>r.name.toLowerCase().includes(q)||(r.tags||[]).some(t=>t.toLowerCase().includes(q)));
  if(showFavs)list=list.filter(r=>r.favourite);
  document.getElementById('rCount').textContent=recipes.length;
  const el=document.getElementById('recipeList');
  if(!list.length){
    el.innerHTML='<div class="es"><span class="ei">'+(showFavs?'💔':'🍴')+'</span><p>'+(showFavs?'No favourites yet.':q?'No recipes match.':'No recipes yet. Tap + to add!')+'</p></div>';
    return;
  }
  el.innerHTML=list.map(r=>
    '<div class="rc-card" onclick="viewRecipe(\''+r.id+'\')">'+
      '<div class="rci">'+
        '<div class="reb">'+(r.emoji||'🍽️')+'</div>'+
        '<div class="rm">'+
          '<div class="rn">'+r.name+'</div>'+
          '<div class="rta">'+(r.tags||[]).map(tagH).join('')+'</div>'+
        '</div>'+
        '<div class="rcr">'+(r.favourite?'❤️':'')+' <span style="color:var(--muted)">›</span></div>'+
      '</div></div>'
  ).join('');
}

// ── Tag input ────────────────────────────────────
function tagKey(e){
  if(e.key==='Enter'||e.key===','){
    e.preventDefault();
    const v=e.target.value.trim().replace(/,$/,'');
    if(v&&!curTags.includes(v)){curTags.push(v);renderTags();}
    e.target.value='';
  }
}
function removeTag(t){curTags=curTags.filter(x=>x!==t);renderTags();}
function renderTags(){
  const box=document.getElementById('tagsBox'),inp=document.getElementById('tagIn');
  box.innerHTML='';
  curTags.forEach(t=>{
    const c=document.createElement('span');
    c.className='tchip '+tcls(t);
    c.innerHTML=t+'<button onclick="removeTag(\''+esc(t)+'\')">×</button>';
    box.appendChild(c);
  });
  box.appendChild(inp);
}

// ── Emoji picker ─────────────────────────────────
// Build flag emojis from regional indicator Unicode pairs
function mkFlag(cc){
  return String.fromCodePoint(
    0x1F1E6-65+cc.charCodeAt(0),
    0x1F1E6-65+cc.charCodeAt(1)
  );
}

function parseIng(){
  const raw=document.getElementById('pasteIng').value.trim();if(!raw)return;
  document.getElementById('ingList').innerHTML='';
  raw.split('\n').forEach(line=>{
    const t=line.trim();if(!t)return;
    if(/^[*\-•]\s+/.test(t))addIR(t.replace(/^[*\-•]\s+/,''));
    else if(/^\d+\.\s+/.test(t))addIR(t.replace(/^\d+\.\s+/,''));
    else addIR(t.replace(/:$/,''),true);
  });
  document.getElementById('pasteIng').value='';
  toast('Ingredients parsed!');
}

  return Array.from(document.querySelectorAll('#ingList .ir')).map(r=>({
    text:r.querySelector('input').value.trim(),group:!!r.querySelector('[data-g]')

// ── Scaler ───────────────────────────────────────
const FMAP={'½':.5,'¼':.25,'¾':.75,'⅓':1/3,'⅔':2/3,'⅛':.125,'⅜':.375,'⅝':.625,'⅞':.875};
const FRE=new RegExp(Object.keys(FMAP).join('|'),'g');
function niceN(n){
  if(n%1===0)return ''+n;
  const fd=[[1,2],[1,4],[3,4],[1,3],[2,3],[1,8],[3,8],[5,8],[7,8]];
  const fs=['½','¼','¾','⅓','⅔','⅛','⅜','⅝','⅞'];
  for(let i=0;i<fd.length;i++){
    const w=Math.floor(n),rem=n-w;
    if(Math.abs(rem-fd[i][0]/fd[i][1])<0.015)return(w>0?w+' ':'')+fs[i];
  }
  return (Math.round(n*100)/100)+'';
}
function scaleT(text,m){
  if(m===1)return text;
  let s=text.replace(FRE,x=>FMAP[x]);
  s=s.replace(/(\d+)\s+(0\.\d+)/g,(_,w,f)=>(+w+ +f)+'');
  return s.replace(/\b(\d+(\.\d+)?)\b/g,(_,n)=>niceN(+n*m));
}
function updateScaler(d){
  servings=Math.max(1,servings+d);
  const el=document.getElementById('scalerVal');
  if(el)el.textContent='×'+servings;
  renderIngView();
}

// ── View: ingredients ────────────────────────────
function renderIngView(){
  const r=recipes.find(x=>x.id===viewId);if(!r)return;
  const cont=document.getElementById('ingCont');if(!cont)return;
  let html='',ii=0;
  (r.ingredients||[]).forEach(i=>{
    if(i.group){
      html+='<div class="igt">'+i.text+'</div>';
    }else{
      const idx=ii++;
      const scaled=scaleT(i.text,servings);
      const unchanged=servings>1&&scaled===i.text;
      const done=doneI.has(idx);
      html+='<div class="ii'+(done?' done':'')+(unchanged?' nc':'')+'" onclick="toggleI('+idx+')">'+
        '<div class="icb">'+(done?'✓':'')+'</div>'+
        '<span>'+scaled+'</span>'+
        (unchanged?'<span class="ncl">no change</span>':'')+
        '</div>';
    }
  });
  cont.innerHTML=html;
}
function toggleI(idx){doneI.has(idx)?doneI.delete(idx):doneI.add(idx);renderIngView();}

// ── View: steps ──────────────────────────────────

  const r=recipes.find(x=>x.id===viewId);if(!r)return;

}
function toggleS(idx){doneS.has(idx)?doneS.delete(idx):doneS.add(idx);renderStepView();}

// ── View recipe ──────────────────────────────────
function viewRecipe(id){
  const r=recipes.find(x=>x.id===id);if(!r)return;
  viewId=id;servings=1;doneI.clear();doneS.clear();
  const body=document.getElementById('viewBody');
  body.innerHTML='';

  function mk(tag,cls,text){const e=document.createElement(tag);if(cls)e.className=cls;if(text!==undefined)e.textContent=text;return e;}
  function section(title){
    const w=mk('div','vs');
    w.appendChild(mk('div','vst',title));
    body.appendChild(w);
    return w;
  }

  // Emoji + name
  body.appendChild(mk('div','vemoji')).textContent=r.emoji||'🍽️';
  body.appendChild(mk('div','vname',r.name));

  // Tags
  if((r.tags||[]).length){
    const te=mk('div','rta');
    te.style.cssText='justify-content:center;margin-bottom:16px';
    te.innerHTML=r.tags.map(tagH).join('');
    body.appendChild(te);
  }

  // Scaler — show when any non-group ingredient exists
  if((r.ingredients||[]).some(i=>!i.group)){
    const sc=mk('div','scaler');
    sc.innerHTML=
      '<span class="sc-label">Scale recipe</span>'+
      '<div class="sc-ctrl">'+
        '<button class="sc-btn" onclick="updateScaler(-1)">&#8722;</button>'+
        '<span class="sc-val" id="scalerVal">&#215;1</span>'+
        '<button class="sc-btn" onclick="updateScaler(1)">+</button>'+
      '</div>';
    body.appendChild(sc);
  }

  // Links
  if((r.links||[]).length){
    const sec=section('🔗 Links');
    r.links.forEach(l=>{
      const a=document.createElement('a');
      a.href=l.url;a.target='_blank';a.className='li';
      const icon=l.url.includes('youtube')?'▶️':l.url.includes('instagram')?'📸':'🌐';
      a.innerHTML='<span style="font-size:1.2rem">'+icon+'</span>'+
        '<div style="flex:1;min-width:0">'+
          '<div style="font-size:.75rem;color:var(--muted)">'+(l.label||'Link')+'</div>'+
          '<div style="font-size:.82rem;color:var(--amber);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+l.url+'</div>'+
        '</div><span>›</span>';
      sec.appendChild(a);
    });
  }

  // Ingredients
  if((r.ingredients||[]).length){
    const sec=section('🧺 Ingredients');
    const cont=mk('div');cont.id='ingCont';sec.appendChild(cont);
  }

  // Steps
  if((r.steps||[]).length){
    const sec=section('👩‍🍳 Method');
    const cont=mk('div');cont.id='stepCont';sec.appendChild(cont);
  }

  // Notes
  if(r.notes){
    const sec=section('📝 Notes');
    const nd=mk('div','vnotes',r.notes);sec.appendChild(nd);
  }

  // Buttons
  body.appendChild(mk('div')).style.height='16px';

  const fb=mk('button','btn bf'+(r.favourite?' on':''));
  fb.id='vFavBtn';fb.textContent=r.favourite?'❤️ Unfavourite':'🤍 Add to Favourites';
  fb.onclick=function(){toggleFav(r.id);};body.appendChild(fb);

  const eb=mk('button','btn bs','✏️ Edit Recipe');
  eb.onclick=function(){openEdit(r.id);};body.appendChild(eb);

  const xb=mk('button','btn bs','⬇ Export This Recipe');
  xb.onclick=function(){exportOne(r.id);};body.appendChild(xb);

  // Now populate ingredient and step containers
  renderIngView();
  renderStepView();

  document.getElementById('viewModal').classList.add('open');
}

// ── CSV ──────────────────────────────────────────
const HDRS=['id','name','emoji','tags','ingredients','steps','links','notes','favourite','createdAt','updatedAt'];
function toRow(r){return HDRS.map(h=>{let v=r[h];if(Array.isArray(v))v=JSON.stringify(v);return'"'+(v==null?'':String(v).replace(/"/g,'""'))+'"';}).join(',');}
function exportAll(){dl([HDRS.join(','),...recipes.map(toRow)].join('\r\n'),'recipes_'+new Date().toISOString().slice(0,10)+'.csv');toast('Exported!');}
function exportOne(id){const r=recipes.find(x=>x.id===id);if(!r)return;dl([HDRS.join(','),toRow(r)].join('\r\n'),r.name.replace(/[^a-z0-9]/gi,'_')+'.csv');toast('Exported!');}
function dl(text,name){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'text/csv'}));a.download=name;a.click();}
function importCSV(ev){
  const f=ev.target.files[0];if(!f)return;
  const fr=new FileReader();
  fr.onload=e=>{
    try{
      const lines=e.target.result.split('\n').filter(Boolean);
      const hdrs=csvRow(lines[0]);let n=0;
      for(let i=1;i<lines.length;i++){
        const v=csvRow(lines[i]),o={};
        hdrs.forEach((h,j)=>o[h]=v[j]||'');
        ['tags','ingredients','steps','links'].forEach(f=>{try{o[f]=o[f]?JSON.parse(o[f]):[];}catch{o[f]=[];}});
        if(!o.name)continue;if(!o.id)o.id=uid();
        const x=recipes.findIndex(r=>r.id===o.id);
        if(x>=0)recipes[x]=o;else recipes.unshift(o);n++;
      }
      save();renderList();closeSettings();toast('Imported '+n+' recipe(s)!');
    }catch(e){alert('Import error: '+e.message);}
    ev.target.value='';
  };
  fr.readAsText(f);
}
function csvRow(row){
  const res=[];let cur='',q=false;
  for(let i=0;i<row.length;i++){
    const c=row[i];
    if(c==='"'){if(q&&row[i+1]==='"'){cur+='"';i++;}else q=!q;}
    else if(c===','&&!q){res.push(cur);cur='';}
    else cur+=c;
  }
  res.push(cur);return res;
}
